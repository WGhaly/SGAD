version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sgad_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgad_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sgad_website}
    ports:
      - "5432:5432"
    volumes:
      - sgad_postgres_data:/var/lib/postgresql/data

volumes:
  sgad_postgres_data:
